; LiteSpeed için PHP ayarları
; Bu dosya LiteSpeed sunucularda otomatik yüklenir

upload_max_filesize = 1024M
post_max_size = 2048M
memory_limit = 1024M
max_execution_time = 1800
max_input_time = 1800
max_input_vars = 5000

; Socket timeout - ÇOK ÖNEMLİ!
default_socket_timeout = 600

; Request timeouts
mysql.connect_timeout = 300

; LiteSpeed specific
max_file_uploads = 100

; Output buffering (LiteSpeed için)
output_buffering = Off
implicit_flush = On

